statement:
  title: Computation Demystifies Semiclassical Gravity

engineering_statement:
  statement: >
    Physical theories should preserve observed computational constraints.

  observation: >
    Semiclassical gravity introduces nonlinear quantum dynamics.

  context: >
    Generic nonlinear quantum theories can efficiently solve
    NP-complete problems.

  next_step: >
    Determine experimentally whether gravity exhibits
    fundamentally quantum behavior.
